# Configuraci\u00f3n de la Base de Datos (MySQL de WampServer)
spring.datasource.url=jdbc:mysql://localhost:3306/escuela_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraci\u00f3n de Hibernate (Para que Spring cree las tablas solo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect