# 1. Conexi\u00f3n \u00danica (Railway ya sabe qu\u00e9 hacer con esto)
spring.datasource.url=${MYSQL_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate y Dialecto (Para que Java hable el mismo idioma que la DB)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 3. Puerto Din\u00e1mico (Obligatorio para que no crashee al arrancar)
server.port=${PORT:8080}

# 4. Estrategia de nombres (Lo que ya ten\u00edas para tus tablas)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl